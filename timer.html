<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>⏱ Workout Timer</h1>
<p>Stay Focused • Stay Strong</p>
</header>

<section>

<h2>Workout Countdown</h2>

<h1 id="timer">60</h1>

<button onclick="startTimer()">▶️ Start</button>

<button onclick="pauseTimer()">⏸ Pause</button>

<button onclick="resetTimer()">🔄 Reset</button>

</section>

<br>

<a href="workout.html">
<button>⬅ Back to Workout Hub</button>
</a>

<br><br>

<script>

let time = 60;
let timer;
let running = false;

function updateDisplay(){
document.getElementById("timer").innerHTML = time + " sec";
}

function startTimer(){

if(running) return;

running = true;

timer = setInterval(function(){

if(time > 0){
time--;
updateDisplay();
}
else{
clearInterval(timer);
running = false;
alert("🎉 Time's Up! Great Job!");
}

},1000);

}

function pauseTimer(){

clearInterval(timer);
running = false;

}

function resetTimer(){

clearInterval(timer);
running = false;
time = 60;
updateDisplay();

}

updateDisplay();

</script>

</body>
</html>
