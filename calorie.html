<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calorie Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🔥 Calorie Calculator</h1>
<p>Find Your Daily Calorie Requirement</p>
</header>

<section>

<h2>Enter Your Details</h2>

<label>Age (15–80 Years)</label><br><br>
<input type="number" id="age" min="15" max="80" placeholder="Enter your age"><br><br>

<label>Gender</label><br><br>

<select id="gender">
<option value="male">👨 Male</option>
<option value="female">👩 Female</option>
</select>

<br><br>

<label>Height (cm)</label><br><br>
<input type="number" id="height" placeholder="Enter height"><br><br>

<label>Weight (kg)</label><br><br>
<input type="number" id="weight" placeholder="Enter weight"><br><br>

<label>Activity Level</label><br><br>

<select id="activity">
<option value="1.2">😴 Sedentary (Little or No Exercise)</option>
<option value="1.375">🚶 Light Exercise (1–3 Days/Week)</option>
<option value="1.55">🏃 Moderate Exercise (3–5 Days/Week)</option>
<option value="1.725">💪 Heavy Exercise (6–7 Days/Week)</option>
<option value="1.9">🏋 Athlete (Very Heavy Exercise)</option>
</select>

<br><br>

<button onclick="calculateCalories()">Calculate Calories</button>

<h2 id="result"></h2>

</section>

<br>

<a href="workout.html">
<button>⬅ Back to Workout Hub</button>
</a>

<br><br>

<script>

function calculateCalories(){

let age = parseInt(document.getElementById("age").value);

if(age < 15 || age > 80){
alert("Please enter an age between 15 and 80.");
return;
}

let gender = document.getElementById("gender").value;
let height = parseFloat(document.getElementById("height").value);
let weight = parseFloat(document.getElementById("weight").value);
let activity = parseFloat(document.getElementById("activity").value);

let bmr;

if(gender=="male"){
bmr=(10*weight)+(6.25*height)-(5*age)+5;
}
else{
bmr=(10*weight)+(6.25*height)-(5*age)-161;
}

let calories=Math.round(bmr*activity);

document.getElementById("result").innerHTML=
"<h3>🔥 Your Daily Calorie Requirement</h3>" +
"<h1>"+calories+" kcal/day</h1>";

}

</script>

</body>
</html>
