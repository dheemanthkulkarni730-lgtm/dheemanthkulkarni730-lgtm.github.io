<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dheemanth's World</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    font-size: 60px;
    color: #d4af37;
    text-shadow: 0 0 25px rgba(212,175,55,0.6);
    animation: fadeDown 1s ease;
}

/* SCROLL ANIMATION */
@keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* BUTTON */
button {
    background: red;
    color: white;
    border: none;
    padding: 14px 25px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(212,175,55,0.5),
        transparent
    );
    transition: 0.5s;
}

button:hover::before {
    left: 100%;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px rgba(212,175,55,0.5);
}

/* SECTIONS */
section {
    min-height: 100vh;
    padding: 80px 20px;
}

/* CARDS CONTAINER */
.container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
}

/* PREMIUM CARD */
.card {
    background: #111;
    border: 1px solid #333;
    padding: 25px;
    border-radius: 15px;
    width: 85%;
    max-width: 600px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

/* SIDE GOLD LIGHT */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(212,175,55,0.2),
        transparent
    );
    transition: 0.6s;
}

.card:hover::before {
    left: 100%;
}

/* GLOW EFFECT */
.card:hover {
    transform: scale(1.05);
    border-color: #d4af37;
    box-shadow: 0 0 25px rgba(212,175,55,0.4);
}

.card h2 {
    color: #d4af37;
}

/* SCROLL BUTTON STYLE */
.scroll-btn {
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>🏋️ Welcome to Dheemanth's World</h1>

<button onclick="document.getElementById('workout').scrollIntoView({behavior:'smooth'})">
Explore
</button>
</div>

<!-- WORKOUT SECTION -->
<section id="workout">

<div class="container">

<div class="card">
<h2>🏋️ Workouts</h2>
<p>Push • Pull • Legs • Weight Gain • Weight Loss</p>

<button onclick="document.getElementById('music').scrollIntoView({behavior:'smooth'})">
Explore Workouts
</button>
</div>

</div>

</section>

<!-- MUSIC SECTION -->
<section id="music">

<div class="container">

<div class="card">
<h2>🎵 Music</h2>
<p>Raags • Taals • Hindustani Classical</p>

<button onclick="window.scrollTo({top:0, behavior:'smooth'})">
Back to Home
</button>
</div>

</div>

</section>

</body>
</html>
