<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fitness App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* NAV */
nav {
    background: #1e293b;
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

nav button {
    padding: 10px;
    border: none;
    background: #38bdf8;
    cursor: pointer;
    border-radius: 8px;
}

/* SECTIONS */
section {
    display: none;
    padding: 20px;
    animation: fade 0.4s ease;
}

.active {
    display: block;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
}
input, select {
    width: 90%;
    padding: 8px;
    margin: 5px 0;
}
</style>
</head>

<body>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('bmi')">BMI</button>
<button onclick="show('calorie')">Calories</button>
<button onclick="show('timer')">Timer</button>
<button onclick="show('diet')">Diet</button>

<!-- FIXED: correct mapping -->
<button onclick="show('weightgain')">Weight Gain</button>
<button onclick="show('legs')">Legs</button>
</nav>

<!-- HOME -->
<section id="home" class="active">
<h1>🏋️ Fitness App</h1>
<p>All tools in one place</p>
</section>

<!-- BMI -->
<section id="bmi">
<div class="card">
<h2>BMI Calculator</h2>
<input id="w" placeholder="Weight (kg)">
<input id="h" placeholder="Height (cm)">
<button onclick="calcBMI()">Calculate</button>
<p id="bmiResult"></p>
</div>
</section>

<!-- CALORIES -->
<section id="calorie">
<div class="card">
<h2>Calories</h2>
<input id="age" placeholder="Age">
<input id="cw" placeholder="Weight (kg)">
<button onclick="calcCal()">Calculate</button>
<p id="calResult"></p>
</div>
</section>

<!-- TIMER -->
<section id="timer">
<div class="card">
<h2>Timer</h2>
<p id="time">00:00</p>
<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
</div>
</section>

<!-- DIET -->
<section id="diet">
<div class="card">
<h2>Diet</h2>
<select onchange="diet(this.value)">
<option value="">Select</option>
<option value="gain">Weight Gain</option>
<option value="loss">Weight Loss</option>
</select>
<p id="dietPlan"></p>
</div>
</section>

<!-- WEIGHT GAIN -->
<section id="weightgain">
<div class="card">
<h2>Weight Gain Plan</h2>
<p>🍚 Rice, Paneer, Milk, Banana, Nuts, Peanut butter</p>
</div>
</section>

<!-- LEGS -->
<section id="legs">
<div class="card">
<h2>Leg Workout</h2>
<p>🏋️ Squats, Lunges, Leg press, Calf raises</p>
</div>
</section>

<script>

/* NAV */
function show(id){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* BMI */
function calcBMI(){
    let w = document.getElementById("w").value;
    let h = document.getElementById("h").value / 100;
    let bmi = w / (h*h);
    document.getElementById("bmiResult").innerText = "BMI: " + bmi.toFixed(2);
}

/* CALORIES */
function calcCal(){
    let age = document.getElementById("age").value;
    let w = document.getElementById("cw").value;

    let bmr = 10*w + 6.25*170 - 5*age + 5;
    let cal = bmr * 1.5;

    document.getElementById("calResult").innerText =
    "Calories: " + Math.round(cal);
}

/* TIMER */
let t;
let sec = 0;

function startTimer(){
    t = setInterval(()=>{
        sec++;
        let m = String(Math.floor(sec/60)).padStart(2,'0');
        let s = String(sec%60).padStart(2,'0');
        document.getElementById("time").innerText = m+":"+s;
    },1000);
}

function stopTimer(){
    clearInterval(t);
}

/* DIET */
function diet(val){
    if(val=="gain"){
        document.getElementById("dietPlan").innerText =
        "🍚 Eat: Rice, Milk, Paneer, Nuts, Banana";
    }
    if(val=="loss"){
        document.getElementById("dietPlan").innerText =
        "🥗 Eat: Salad, Oats, Fruits, Protein foods";
    }
}

</script>

</body>
</html>
