<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dheemanth's World</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: #f5f5f5;
}

/* GOLD ACCENT */
:root {
    --gold: #d4af37;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    font-size: 42px;
    color: var(--gold);
}

/* BUTTON (GOLD STYLE LIKE FIRST THEME) */
button {
    background: var(--gold);
    color: black;
    border: none;
    padding: 12px 22px;
    border-radius: 30px;
    cursor: pointer;
    margin-top: 15px;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* SECTIONS */
section {
    min-height: 100vh;
    padding: 80px 20px;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
}

/* OPTIONAL GOLD LINE */
.line {
    width: 80px;
    height: 3px;
    background: var(--gold);
    margin: 10px auto;
}
</style>
</head>

<body>

<!-- HOME -->
<div class="hero">
<h1>🏋️ Welcome to Dheemanth's World</h1>
<div class="line"></div>

<button onclick="document.getElementById('workouts').scrollIntoView({behavior:'smooth'})">
Explore
</button>
</div>

<!-- WORKOUTS -->
<section id="workouts">
<div class="container">

<h2></h2>

<!-- YOU WILL ADD PUSH / PULL / LEGS LATER -->

<button onclick="document.getElementById('music').scrollIntoView({behavior:'smooth'})">
Explore Music
</button>

</div>
</section>

<!-- MUSIC -->
<section id="music">
<div class="container">

<h2></h2>

<!-- YOU WILL ADD RAAGS / TAALS LATER -->

<button onclick="window.scrollTo({top:0, behavior:'smooth'})">
Back to Home
</button>

</div>
</section>

</body>
</html>
