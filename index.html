<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dheemanth's World</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    color: #d4af37;
    font-size: 42px;
}

/* BUTTON */
button {
    background: #d4af37;
    color: black;
    border: none;
    padding: 12px 20px;
    border-radius: 30px;
    cursor: pointer;
    margin: 8px;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* CARD */
.card {
    background: #111;
    border: 1px solid #333;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
}

.card h3 {
    color: #d4af37;
}
</style>
</head>

<body>

<!-- HOME -->
<div class="hero">
<h1>🏋️ Welcome to Dheemanth's World</h1>
<p>Fitness • Discipline • Growth</p>

<button onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})">
Explore
</button>
</div>

<!-- MENU -->
<section id="menu">

<div class="grid">

<div class="card">
<h3>Push Day</h3>
<button onclick="location.href='push.html'">Explore</button>
</div>

<div class="card">
<h3>Pull Day</h3>
<button onclick="location.href='pull.html'">Explore</button>
</div>

<div class="card">
<h3>Leg Day</h3>
<button onclick="location.href='legs.html'">Explore</button>
</div>

<div class="card">
<h3>Weight Gain</h3>
<button onclick="location.href='weightgain.html'">Explore</button>
</div>

<div class="card">
<h3>Weight Loss</h3>
<button onclick="location.href='weightloss.html'">Explore</button>
</div>

<div class="card">
<h3>BMI</h3>
<button onclick="location.href='bmi.html'">Explore</button>
</div>

<div class="card">
<h3>Calories</h3>
<button onclick="location.href='calorie.html'">Explore</button>
</div>

<div class="card">
<h3>Progress</h3>
<button onclick="location.href='progress.html'">Explore</button>
</div>

<div class="card">
<h3>Timer</h3>
<button onclick="location.href='timer.html'">Explore</button>
</div>

<!-- 🔥 MUSIC ADDED HERE -->
<div class="card">
<h3>Music (Raags & Taals)</h3>
<button onclick="location.href='music.html'">Explore</button>
</div>

</div>

</section>

</body>
</html>
