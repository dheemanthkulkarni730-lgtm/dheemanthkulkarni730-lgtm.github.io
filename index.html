<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dheemanth's World</title>

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
}

.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    font-size: 60px;
    color: #d4af37;
    text-shadow: 0 0 20px rgba(212,175,55,0.6);
}

/* BUTTON */
button {
    background: red;
    color: white;
    border: none;
    padding: 14px 25px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px rgba(212,175,55,0.5);
}

/* CARD */
.card {
    background: #111;
    border: 1px solid #333;
    padding: 25px;
    border-radius: 15px;
    width: 80%;
    max-width: 600px;
    margin: auto;
    text-align: center;
    position: relative;
    overflow: hidden;
}

.card h2 {
    color: #d4af37;
}

/* GLOW EFFECT */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(212,175,55,0.2),
        transparent
    );
    transition: 0.5s;
}

.card:hover::before {
    left: 100%;
}
</style>
</head>

<body>

<!-- HOME -->
<div class="hero">
<h1>🏋️ Welcome to Dheemanth's World</h1>

<button onclick="document.getElementById('section1').scrollIntoView({behavior:'smooth'})">
Explore
</button>
</div>

<!-- SECTION -->
<div id="section1" style="padding:80px 20px;">

<div class="card">
<h2>🔥 Workouts</h2>
<p>Push • Pull • Legs • Weight Gain • Weight Loss</p>

<!-- THIS IS THE REAL FIX -->
<button onclick="location.href='workout.html'">
Explore Workouts
</button>
</div>

<br><br>

<div class="card">
<h2>🎵 Music</h2>
<p>Raags • Taals • Classical Music</p>

<button onclick="location.href='music.html'">
Explore Music
</button>
</div>

</div>

</body>
</html>
