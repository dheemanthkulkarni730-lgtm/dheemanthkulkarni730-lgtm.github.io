<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dheemanth Fitness World</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
    background: #1e293b;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* CARD */
.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* BUTTON */
button {
    background: #38bdf8;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #0ea5e9;
}
</style>
</head>

<body>

<header>
<h1>🏋️ Dheemanth's Fitness World</h1>
<p>Choose your workout & tools</p>
</header>

<div class="grid">

<div class="card">
<h3>🔥 Push Day</h3>
<button onclick="location.href='push.html'">Explore</button>
</div>

<div class="card">
<h3>💪 Pull Day</h3>
<button onclick="location.href='pull.html'">Explore</button>
</div>

<div class="card">
<h3>🦵 Leg Day</h3>
<button onclick="location.href='leg.html'">Explore</button>
</div>

<div class="card">
<h3>🍚 Weight Gain</h3>
<button onclick="location.href='weightgain.html'">Explore</button>
</div>

<div class="card">
<h3>🥗 Weight Loss</h3>
<button onclick="location.href='weightloss.html'">Explore</button>
</div>

<div class="card">
<h3>📊 BMI Calculator</h3>
<button onclick="location.href='bmi.html'">Explore</button>
</div>

<div class="card">
<h3>🔥 Calories</h3>
<button onclick="location.href='calorie.html'">Explore</button>
</div>

<div class="card">
<h3>📈 Progress</h3>
<button onclick="location.href='progress.html'">Explore</button>
</div>

<div class="card">
<h3>⏱ Timer</h3>
<button onclick="location.href='timer.html'">Explore</button>
</div>

</div>

</body>
</html>
