<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📊 BMI Calculator</h1>
    <p>Check your Body Mass Index</p>
</header>

<section>

    <h2>Enter Your Details</h2>

    <label>Height (cm)</label><br><br>
    <input type="number" id="height" placeholder="Example: 170"><br><br>

    <label>Weight (kg)</label><br><br>
    <input type="number" id="weight" placeholder="Example: 65"><br><br>

    <button onclick="calculateBMI()">Calculate BMI</button>

    <h2 id="result"></h2>

</section>

<br>

<a href="workout.html">
    <button>⬅ Back to Workout Hub</button>
</a>

<br><br>

<script>

function calculateBMI(){

    let height = document.getElementById("height").value;
    let weight = document.getElementById("weight").value;

    height = height / 100;

    let bmi = weight / (height * height);

    let message = "";

    if(bmi < 18.5){
        message = "Underweight 🟡";
    }
    else if(bmi < 25){
        message = "Normal Weight 🟢";
    }
    else if(bmi < 30){
        message = "Overweight 🟠";
    }
    else{
        message = "Obese 🔴";
    }

    document.getElementById("result").innerHTML =
    "Your BMI is <br><br><strong>" +
    bmi.toFixed(1) +
    "</strong><br><br>" +
    message;

}

</script>

</body>
</html>
